name: C++ CI (minima-core-cpp)

on:
  push:
    branches: [main]
    paths:
      - 'minima-core-cpp/**'
      - '.github/workflows/cpp-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'minima-core-cpp/**'
      - '.github/workflows/cpp-ci.yml'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc-12
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-24.04
            compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
          - os: ubuntu-22.04
            compiler: clang-15
            cc: clang-15
            cxx: clang++-15

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build build-essential
          if [[ "${{ matrix.compiler }}" == "gcc-12" ]]; then
            sudo apt-get install -y gcc-12 g++-12
          fi
          if [[ "${{ matrix.compiler }}" == "clang-15" ]]; then
            sudo apt-get install -y clang-15 || sudo apt-get install -y clang
          fi

      - name: Configure CMake
        working-directory: minima-core-cpp
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIMA_BUILD_TESTS=ON \
            -DMINIMA_CRYPTO_OPENSSL=OFF \
            -G Ninja

      - name: Build
        working-directory: minima-core-cpp
        run: cmake --build build --parallel

      - name: Run Tests
        working-directory: minima-core-cpp
        run: ctest --test-dir build --output-on-failure --parallel 4

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.compiler }}-${{ matrix.os }}
          path: minima-core-cpp/build/Testing/

  cpp-status:
    name: C++ CI Status
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "success" ]]; then
            echo "✅ All C++ builds and tests passed (163 tests, 12 suites)"
          else
            echo "❌ C++ build or test failure"
            exit 1
          fi
