name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ── Native build + tests (GCC, Ubuntu 22 & 24) ────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake build-essential ninja-build

      - name: Configure (CMake)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIMA_BUILD_TESTS=ON \
            -DMINIMA_CRYPTO_OPENSSL=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ── Clang build ────────────────────────────────────────────────────────
  clang-build:
    name: Build (clang, Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang-15 ninja-build

      - name: Configure (Clang)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++-15 \
            -DMINIMA_BUILD_TESTS=ON \
            -DMINIMA_CRYPTO_OPENSSL=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ── ARM64 cross-compile (no tests — QEMU not set up) ──────────────────
  cross-aarch64:
    name: Cross-compile ARM64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure (aarch64)
        run: |
          cmake -B build-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-aarch64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIMA_BUILD_TESTS=OFF \
            -DMINIMA_CRYPTO_OPENSSL=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build-arm64 --parallel

      - name: Verify binary architecture
        run: |
          file build-arm64/minima_node
          file build-arm64/minima_node | grep -q "ARM aarch64"

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: minima_node-aarch64-linux-gnu
          path: build-arm64/minima_node
          if-no-files-found: error

  # ── ARMv7 cross-compile ────────────────────────────────────────────────
  cross-armv7:
    name: Cross-compile ARMv7
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ARMv7 cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Configure (armv7)
        run: |
          cmake -B build-armv7 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-armv7.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIMA_BUILD_TESTS=OFF \
            -DMINIMA_CRYPTO_OPENSSL=OFF \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build-armv7 --parallel

      - name: Verify binary architecture
        run: |
          file build-armv7/minima_node
          file build-armv7/minima_node | grep -q "ARM"

      - name: Upload ARMv7 binary
        uses: actions/upload-artifact@v4
        with:
          name: minima_node-armv7-linux-gnueabihf
          path: build-armv7/minima_node
          if-no-files-found: error

  # ── npm publish (tylko przy tagu v*) ──────────────────────────────────
  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-22.04
    needs: [build-and-test]   # czeka aż testy przejdą
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: |
          cd monorepo
          npm install

      - name: Build all packages
        run: |
          cd monorepo
          npm run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Bump version in all packages
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for pkg in monorepo/packages/*/; do
            cd /home/runner/work/$(basename $GITHUB_REPOSITORY)/$pkg 2>/dev/null || cd $GITHUB_WORKSPACE/$pkg
            npm version $VERSION --no-git-tag-version
            cd $GITHUB_WORKSPACE
          done

      - name: Publish minima-test
        run: cd monorepo/packages/minima-test && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish kiss-vm-lint
        run: cd monorepo/packages/kiss-vm-lint && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish minima-contracts
        run: cd monorepo/packages/minima-contracts && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @jaroslawfejdasz/create-minidapp
        run: cd monorepo/packages/create-minidapp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release (tylko przy tagu v*) ───────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-and-test, cross-aarch64, cross-armv7]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: minima_node-aarch64-linux-gnu
          path: artifacts/aarch64

      - name: Download ARMv7 binary
        uses: actions/download-artifact@v4
        with:
          name: minima_node-armv7-linux-gnueabihf
          path: artifacts/armv7

      - name: Rename binaries
        run: |
          mv artifacts/aarch64/minima_node artifacts/minima_node-aarch64-linux-gnu
          mv artifacts/armv7/minima_node   artifacts/minima_node-armv7-linux-gnueabihf
          chmod +x artifacts/minima_node-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Minima Core C++ ${{ github.ref_name }}"
          body: |
            ## Minima Core C++ ${{ github.ref_name }}

            ### npm packages
            ```
            npm install minima-test
            npm install kiss-vm-lint
            npm install minima-contracts
            npm install @jaroslawfejdasz/create-minidapp
            ```

            ### Pre-built binaries
            - `minima_node-aarch64-linux-gnu` — ARM64 (Raspberry Pi 4/5)
            - `minima_node-armv7-linux-gnueabihf` — ARMv7 (Raspberry Pi 2/3)

            ### Changes
            See [IMPLEMENTATION_STATUS.md](IMPLEMENTATION_STATUS.md) for full status.
          files: |
            artifacts/minima_node-aarch64-linux-gnu
            artifacts/minima_node-armv7-linux-gnueabihf
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
